<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<!-- Head (all meta link scripts go here ) START -->
<div th:replace="fragments/head :: head"></div>
<head/>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg sidebar-mini bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- TOP Menu (all meta link scripts go here ) START -->
    <div th:replace="fragments/topmenu :: topmenu"></div>
    <!-- TOP Menu (all meta link scripts go here ) END -->

    <!-- Left side column. contains the sidebar START -->
    <div th:replace="fragments/menusidebar :: menusidebar"></div>
    <!-- Left side column. contains the sidebar END -->

    <!--begin::App Main-->
    <main class="app-main">
        <div class="app-content-top-area">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="fw-semibold">Brand Management</div>
                    </div>

                    <div class="col-md-6 text-end">
                        <button type="button"
                                class="btn btn-primary"
                                id="btnCreateBrand"
                                data-bs-toggle="modal"
                                data-bs-target="#brandModal">
                            <i class="bi bi-plus-circle me-1"></i>
                            Create Brand
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-content-header">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-sm-8">
                        <h3 class="mb-0">Brand List</h3>
                    </div>
                    <div class="col-sm-4">
                        <ol class="breadcrumb float-sm-end">
                            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Brands</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-content">
            <div class="container-fluid">

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Brands</h3>

                                <div class="card-tools">
                                    <button type="button"
                                            class="btn btn-tool"
                                            data-lte-toggle="card-collapse"
                                            title="Collapse">
                                        <i data-lte-icon="expand" class="bi bi-plus-lg"></i>
                                        <i data-lte-icon="collapse" class="bi bi-dash-lg"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="table-light">
                                        <tr>
                                            <th style="width: 90px;">ID</th>
                                            <th>Name</th>
                                            <th>Code</th>
                                            <th>Status</th>
                                            <th class="text-end" style="width: 180px;">Actions</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:if="${#lists.isEmpty(brands)}">
                                            <td colspan="5" class="text-center text-muted py-4">
                                                No brands found.
                                            </td>
                                        </tr>

                                        <tr th:each="item : ${brands}">
                                            <td th:text="${item.id()}">1</td>
                                            <td class="fw-semibold" th:text="${item.name()}">KYB</td>
                                            <td th:text="${item.code() != null ? item.code() : '-'}">KYB</td>
                                            <td>
                                                <span th:if="${item.active()}" class="badge text-bg-success">Active</span>
                                                <span th:unless="${item.active()}" class="badge text-bg-secondary">Inactive</span>
                                            </td>
                                            <td class="text-end">
                                                <button type="button"
                                                        class="btn btn-sm btn-warning btn-edit-brand"
                                                        data-bs-toggle="modal"
                                                        data-bs-target="#brandModal"
                                                        th:attr="data-id=${item.id()},
                                                             data-name=${item.name()},
                                                             data-code=${item.code()},
                                                             data-active=${item.active()}">
                                                    <i class="bi bi-pencil-square"></i>
                                                </button>

                                                <form th:action="@{/brands/{id}/delete(id=${item.id()})}"
                                                      method="post"
                                                      class="d-inline"
                                                      onsubmit="return confirm('Delete this brand?');">
                                                    <button type="submit" class="btn btn-sm btn-danger">
                                                        <i class="bi bi-trash"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="card-footer">
                                Total:
                                <span th:text="${#lists.size(brands)}">0</span>
                                item(s)
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Brand Modal -->
        <div class="modal fade" id="brandModal" tabindex="-1" aria-labelledby="brandModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form id="brandForm"
                          method="post"
                          th:object="${form}"
                          th:attr="action=${modalAction}">
                        <div class="modal-header">
                            <h5 class="modal-title" id="brandModalLabel" th:text="${modalTitle}">Create Brand</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="name" class="form-label">Brand Name <span class="text-danger">*</span></label>
                                <input type="text"
                                       id="name"
                                       th:field="*{name}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''"
                                       placeholder="Enter brand name">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                                    Name error
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="code" class="form-label">Code</label>
                                <input type="text"
                                       id="code"
                                       th:field="*{code}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('code')} ? ' is-invalid' : ''"
                                       placeholder="Enter brand code">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">
                                    Code error
                                </div>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="active"
                                       th:field="*{active}">
                                <label class="form-check-label" for="active">
                                    Active
                                </label>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">
                                <span th:text="${editMode} ? 'Update' : 'Create'">Create</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <!--end::App Main-->
    <!--begin::Footer-->
    <footer class="app-footer">
        <!--begin::To the end-->
        <div class="float-end d-none d-sm-inline">Anything you want</div>
        <!--end::To the end-->
        <!--begin::Copyright-->
        <strong>
            Copyright &copy; 2014-2026&nbsp;
            <a href="https://adminlte.io" class="text-decoration-none">AdminLTE.io</a>.
        </strong>
        All rights reserved.
        <!--end::Copyright-->
    </footer>
    <!--end::Footer-->
</div>
<!--end::App Wrapper-->
<!--begin::Script-->
<!--begin::Third Party Plugin(OverlayScrollbars)-->
<!-- =============================================== -->
<!-- common script START -->
<div th:replace="fragments/commonscripts :: commonscripts"/>
<!-- common script END -->
<script src="/resources/lib/jquery-validation/jquery.validate.min.js"></script>

<script th:inline="javascript">
    $(function () {
        const brandModalElement = document.getElementById('brandModal');
        const brandModal = new bootstrap.Modal(brandModalElement);

        const $brandForm = $('#brandForm');
        const $modalTitle = $('#brandModalLabel');

        const $name = $('#name');
        const $code = $('#code');
        const $active = $('#active');

        function resetFormForCreate() {
            $brandForm.attr('action', '/brands/create');
            $modalTitle.text('Create Brand');

            $name.val('');
            $code.val('');
            $active.prop('checked', true);

            resetValidationState();
        }

        function fillFormForEdit(id, name, code, active) {
            $brandForm.attr('action', '/brands/' + id + '/edit');
            $modalTitle.text('Edit Brand');

            $name.val(name || '');
            $code.val(code || '');
            $active.prop('checked', active === true || active === 'true');

            resetValidationState();
        }

        function resetValidationState() {
            $brandForm.validate().resetForm();

            $brandForm.find('.is-invalid').removeClass('is-invalid');
            $brandForm.find('.is-valid').removeClass('is-valid');

            // keep server-rendered feedback blocks intact, but remove plugin-generated labels
            $brandForm.find('label.error').remove();
        }

        $brandForm.validate({
            ignore: [],
            errorElement: 'div',
            errorClass: 'invalid-feedback',
            validClass: 'is-valid',
            rules: {
                name: {
                    required: true,
                    maxlength: 100
                },
                code: {
                    maxlength: 30
                }
            },
            messages: {
                name: {
                    required: 'Brand name is required.',
                    maxlength: 'Brand name must not exceed 100 characters.'
                },
                code: {
                    maxlength: 'Code must not exceed 30 characters.'
                }
            },
            errorPlacement: function (error, element) {
                error.addClass('d-block');

                const existingServerError = element.siblings('.invalid-feedback');
                if (existingServerError.length) {
                    existingServerError.first().replaceWith(error);
                } else {
                    error.insertAfter(element);
                }
            },
            highlight: function (element) {
                $(element).addClass('is-invalid').removeClass('is-valid');
            },
            unhighlight: function (element) {
                $(element).removeClass('is-invalid').addClass('is-valid');
            },
            submitHandler: function (form) {
                form.submit();
            }
        });

        $('#btnCreateBrand').on('click', function () {
            resetFormForCreate();
        });

        $('.btn-edit-brand').on('click', function () {
            const $btn = $(this);

            fillFormForEdit(
                $btn.data('id'),
                $btn.data('name'),
                $btn.data('code'),
                $btn.data('active')
            );
        });

        const showBrandModal = /*[[${showBrandModal}]]*/ false;
        if (showBrandModal) {
            brandModal.show();
        }

        $('#brandModal').on('hidden.bs.modal', function () {
            resetValidationState();
        });
    });
</script>
</body>
<!--end::Body-->
</html>
